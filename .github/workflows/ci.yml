name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all workspace packages (best-effort)
        run: pnpm -r run typecheck

      - name: Typecheck backend
        working-directory: backend
        run: pnpm exec tsc --noEmit
        continue-on-error: false

      - name: Typecheck mobile
        working-directory: mobile
        run: pnpm exec tsc --noEmit
        continue-on-error: false

      - name: Typecheck simulators
        working-directory: simulators
        run: pnpm exec tsc --noEmit
        continue-on-error: false

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: typecheck

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agecare
          POSTGRES_PASSWORD: agecare
          POSTGRES_DB: agecare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agecare"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        working-directory: backend
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://agecare:agecare@localhost:5432/agecare

      - name: Seed database
        run: pnpm --filter @agecare/backend db:seed
        env:
          DATABASE_URL: postgresql://agecare:agecare@localhost:5432/agecare

      - name: Start backend in background
        run: pnpm --filter @agecare/backend dev &
        env:
          DATABASE_URL: postgresql://agecare:agecare@localhost:5432/agecare
          PORT: 8080
          JWT_SECRET: ci-test-secret-not-for-production

      - name: Wait for backend to be ready (30s timeout)
        run: |
          deadline=$((SECONDS + 30))
          until curl -fsS http://localhost:8080/auth/me > /dev/null 2>&1 || curl -fsS http://localhost:8080/health > /dev/null 2>&1; do
            if [ $SECONDS -ge $deadline ]; then
              echo "Backend did not become ready within 30 seconds"
              exit 1
            fi
            sleep 1
          done
          echo "Backend is ready"

      - name: Run E2E smoke test
        run: node e2e/smoke.mjs
        env:
          BACKEND_URL: http://localhost:8080

      - name: Verify smoke result
        run: |
          output=$(node e2e/smoke.mjs 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Result: 8/8 steps passed"; then
            echo "Smoke test passed: 8/8 steps"
          else
            echo "Smoke test did not produce expected output: 'Result: 8/8 steps passed'"
            exit 1
          fi
        env:
          BACKEND_URL: http://localhost:8080
