version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agecare-postgres
    environment:
      POSTGRES_USER: agecare
      POSTGRES_PASSWORD: agecare
      POSTGRES_DB: agecare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agecare -d agecare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
